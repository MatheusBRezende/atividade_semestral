services:
  mongodb:
    image: mongo:7
    container_name: resenhafilmes
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping")' | mongosh --quiet mongodb://localhost:27017/test
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo-data:
    driver: local